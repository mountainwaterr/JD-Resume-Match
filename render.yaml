services:
  - type: web
    name: resume-matcher
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: deepseek
      - key: LLM_MODEL
        value: deepseek-chat
      - key: LLM_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        value: https://placeholder.onrender.com
      - key: PUBLIC_URL
        value: https://placeholder.onrender.com
