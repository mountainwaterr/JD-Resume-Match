services:
  - type: web
    name: resume-matcher-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: deepseek
      - key: LLM_API_KEY
        value: sk-your-deepseek-api-key
      - key: LLM_MODEL
        value: deepseek-chat
      - key: FRONTEND_BASE_URL
        value: https://placeholder.vercel.app
      - key: CORS_ORIGINS
        value: '["https://placeholder.vercel.app"]'
